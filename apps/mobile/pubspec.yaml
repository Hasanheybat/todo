name: workflow_pro
description: "WorkFlow Pro — Tapşırıq, maliyyə və HR idarəetmə"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & Navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  socket_io_client: ^3.0.2
  connectivity_plus: ^6.1.4

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_slidable: ^4.0.3
  table_calendar: ^3.1.3
  fl_chart: ^0.70.2
  google_fonts: ^8.0.2
  flutter_staggered_animations: ^1.1.1

  # Notification
  flutter_local_notifications: ^18.0.1

  # Auth
  local_auth: ^2.3.0

  # File
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  path_provider: ^2.1.5

  # Utils
  intl: ^0.20.2
  flutter_dotenv: ^5.2.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^2.5.8

flutter:
  uses-material-design: true
  assets:
    - .env
